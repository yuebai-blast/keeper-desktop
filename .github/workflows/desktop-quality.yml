name: Desktop Quality

# 可复用的 desktop 质量门禁：供 desktop-ci.yml（PR/push）与 desktop-release.yml
# （发版前）共同调用，保证「合并前校验」与「发版前校验」用同一份定义，永不漂移。
on:
  workflow_call:

permissions:
  contents: read

jobs:
  desktop:
    # 在真实出货平台上跑校验，抓 Linux 抓不到的平台相关问题（mac/win 专属 cfg、平台 API）。
    # 矩阵与 desktop-release.yml 出货目标一一对应，保证每个要发布的平台都被门禁覆盖。
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14        # Apple 芯片 (arm64)——只出货 Apple Silicon，不再支持 Intel mac
          - windows-2022    # Windows (x86_64)，钉死版本保证可复现
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Install toolchain
        run: mise install
      - name: Install desktop deps
        run: mise run desktop-install
      # 先构建前端：vue-tsc 类型检查 + 产出 dist（tauri-build 要求 frontendDist 存在，clippy 才能编译）
      - name: Build frontend (typecheck + dist)
        run: mise run desktop-build
      - name: Rust format check
        run: mise run desktop-fmt-check
      - name: Rust clippy
        run: mise run desktop-clippy
