name: Sidecar CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: uv sync --directory sidecar
      - run: mise run lint
      - run: mise run test
