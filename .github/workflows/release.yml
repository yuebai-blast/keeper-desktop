name: Release
on:
  push:
    # 本仓只产出一个可发布产品（桌面应用，sidecar 随其打包、不独立发布），故 tag 不带组件前缀，直接 v*。
    tags: ["v*.*.*"]
  workflow_dispatch: {}   # 手动逃生口：紧急重发/回滚验证

jobs:
  # 发版前质量门禁（复用 CI 同一份定义，不过不许出包）：desktop（前端类型检查 + Rust 格式/clippy，
  # 双平台矩阵）+ sidecar（lint + test，打包会把它冻结进安装包，发版前先验）。
  verify:
    uses: ./.github/workflows/quality.yml

  # 版本一致性闸门：tag 版本号必须与 tauri.conf.json5 的 version 逐字一致。
  # 二者分别是 latest.json 的版本来源（CI 从 tag 推）与应用自报版本（烤进安装包元数据、
  # updater 据它比对）；不一致会让已装用户陷入反复「有新版」误报。这里在出包前直接拦死。
  # workflow_dispatch（手动逃生口）无 tag，跳过校验、放行重发/回滚。
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert tag version == tauri.conf version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # tauri.conf.json5 带注释，jq 解析不了；按行首缩进锚定顶层 "version" 键，避开注释里的同名字样。
          CONFIG_VERSION=$(sed -nE 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
            desktop/src-tauri/tauri.conf.json5 | head -1)
          echo "tag=$TAG_VERSION  config=$CONFIG_VERSION"
          if [ -z "$CONFIG_VERSION" ]; then
            echo "::error::无法从 tauri.conf.json5 解析出 version 字段"; exit 1
          fi
          if [ "$TAG_VERSION" != "$CONFIG_VERSION" ]; then
            echo "::error::tag 版本($TAG_VERSION) ≠ tauri.conf.json5 version($CONFIG_VERSION)，发版中止。改 config version 后重打 tag。"
            exit 1
          fi
          echo "✅ 版本一致：$TAG_VERSION"

  # 先建好带「更新说明」的 Release，再让 build 往里塞安装包（build needs 它，避免被覆盖）。
  # 更新说明两部分：① annotated tag 的注释（人工写的本次重点，置顶；轻量 tag 无注释则省略）；
  # ② 按约定式提交类型分类的变更日志（mikepenz COMMIT 模式，自动取上个 tag→本 tag）。
  release-notes:
    needs: [verify-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # COMMIT 模式按提交构建日志 + 读 annotated tag 注释，均需全量历史
      - name: Build categorized changelog
        id: changelog
        # COMMIT 模式：直接按提交构建（本仓直推 main、无 PR），不需要 generate_release_notes。
        # label_extractor 从 commit 标题正则抽出类型($1)；categories 只列要展示的类型，
        # 其余（docs/chore/ci/build/style/test）抽到的标签无对应 category → 落 uncategorized，
        # 模板只输出 #{{CHANGELOG}}（各 category 之和）→ 这些噪声类型被自然过滤掉。
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                { "title": "### ✨ 新功能", "labels": ["feat"] },
                { "title": "### 🐛 修复", "labels": ["fix"] },
                { "title": "### ⚡ 性能", "labels": ["perf"] },
                { "title": "### ♻️ 重构", "labels": ["refactor"] },
                { "title": "### ⏪ 回退", "labels": ["revert"] }
              ],
              "label_extractor": [
                { "pattern": "^(feat|fix|perf|refactor|revert|build|chore|ci|docs|style|test)[^:]*:.*", "on_property": "title", "target": "$1" }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble release body (annotated tag note on top)
        id: body
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail
          # 版本号给 Release 标题用（去掉 v 前缀）。
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          : > notes.md
          # annotated tag 注释置顶（人工写的本次重点）；轻量 tag（直接指向 commit）跳过。
          if [ "${{ github.ref_type }}" = "tag" ] && [ "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag" ]; then
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME" >> notes.md
            printf '\n\n' >> notes.md
          fi
          printf '%s\n' "$CHANGELOG" >> notes.md   # 经 env 传入（不用表达式直插脚本），避免特殊字符破坏脚本
          # 空正文兜底：注释为空 + 变更日志被全过滤（提交全是 docs/chore/ci 等）时正文会整篇空白，补占位。
          # changelog action 的 empty_template 只兜「这段范围零提交」，兜不住「有提交但全被过滤」，故在此统一判空。
          if [ -z "$(tr -d '[:space:]' < notes.md)" ]; then
            echo "- 本次无面向用户的变更" > notes.md
          fi
          echo "---- release 正文 ----"; cat notes.md
      - name: Create release with notes
        uses: softprops/action-gh-release@v3
        with:
          name: Keeper v${{ steps.body.outputs.version }}   # 标题=产品名+版本号；默认是 tag 名，不好看，显式设
          body_path: notes.md                               # 正文（body）：tag 注释置顶 + 分类变更日志
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [verify, verify-version, release-notes]   # 门禁全绿 + Release 已建才出包
    permissions:
      contents: write   # 让 GITHUB_TOKEN 能创建/写入 Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple 芯片 (arm64)——只出货 Apple Silicon，不再支持 Intel mac
            platform: darwin-aarch64
          - os: windows-2022     # Windows (x86_64)，钉死版本保证可复现
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      # mise-action 默认 install: true，已自动装 [tools] 工具链，无需再写 `mise install`。
      - uses: jdx/mise-action@v4
      # 项目依赖显式装、--frozen 按 lockfile 精确安装保证可复现（mise-action 只管工具链）。
      - run: mise run install-sidecar --frozen
      - run: mise run install-desktop --frozen
      - run: mise run bundle-sidecar
      - run: mise run stage-sidecar
      - name: Build Tauri app
        # 复用 mise run build-tauri（命令唯一权威在 mise.toml，与 package 共用，避免两处重抄漂移）。
        # task 自带 dir = "desktop"（相对仓库根解析，与 cwd 无关），故无需再设 working-directory。
        # 打包专用配置把 sidecar onedir 目录打进包（bundle.resources）+ 产出带签名的更新制品
        #（createUpdaterArtifacts）。签名私钥由下方 env 从 secret 注入，缺失则构建失败（符合预期）。
        run: mise run build-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Prepare updater artifact + fragment
        # 把本平台的更新制品落到确定名字，并产出一段 latest.json 片段（平台→{签名,下载地址}）供聚合。
        # macOS 的 .app.tar.gz 默认叫 Keeper.app.tar.gz；加 arch 后缀（aarch64）保持与下载页/历史命名一致。
        run: |
          set -euo pipefail
          BUNDLE="desktop/src-tauri/target/release/bundle"
          case "${{ matrix.platform }}" in
            darwin-aarch64) DIR="$BUNDLE/macos"; SUFFIX="aarch64" ;;
            windows-x86_64) DIR="$BUNDLE/nsis"; SUFFIX="" ;;
          esac
          if [ -n "$SUFFIX" ]; then
            SRC=$(ls "$DIR"/*.app.tar.gz)
            BASE=$(basename "$SRC" .app.tar.gz)
            ARTIFACT="$DIR/${BASE}_${SUFFIX}.app.tar.gz"
            mv "$SRC" "$ARTIFACT"
            mv "$SRC.sig" "$ARTIFACT.sig"
          else
            ARTIFACT=$(ls "$DIR"/*-setup.exe)
          fi
          SIG=$(cat "$ARTIFACT.sig")
          FILENAME=$(basename "$ARTIFACT")
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${FILENAME}"
          mkdir -p frag
          jq -nc --arg p "${{ matrix.platform }}" --arg s "$SIG" --arg u "$URL" \
            '{($p): {signature: $s, url: $u}}' > "frag/${{ matrix.platform }}.json"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
      - name: Upload installers + updater artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            desktop/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload latest.json fragment
        uses: actions/upload-artifact@v7
        with:
          name: updater-fragment-${{ matrix.platform }}
          path: frag/

  # 聚合：把各平台片段合成一份 latest.json（updater 据它判断有无新版），上传到同一 Release。
  latest-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: frags
          pattern: updater-fragment-*
          merge-multiple: true
      - name: Compose latest.json
        run: |
          set -euo pipefail
          # 版本号取自 tag（去掉 v 前缀）——必须与 tauri.conf.json5 的 version 一致，
          # 否则 updater 的版本比对会失准（发版前务必把 config version 改成本次版本）。
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORMS=$(jq -s 'reduce .[] as $f ({}; . * $f)' frags/*.json)
          jq -n \
            --arg v "$VERSION" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' > latest.json
          cat latest.json
      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v3
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
