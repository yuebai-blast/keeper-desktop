name: Desktop Release
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch: {}   # 手动逃生口：紧急重发/回滚验证

jobs:
  # 发版前质量门禁（复用 CI 同一份定义，不过不许出包）：
  #   verify-desktop —— 前端类型检查 + Rust 格式/clippy，在三平台矩阵各跑一遍；
  #   verify-sidecar —— sidecar lint + test（打包会把它冻结进安装包，发版前先验）。
  verify-desktop:
    uses: ./.github/workflows/desktop-quality.yml
  verify-sidecar:
    uses: ./.github/workflows/sidecar-quality.yml

  # 版本一致性闸门：tag 版本号必须与 tauri.conf.json5 的 version 逐字一致。
  # 二者分别是 latest.json 的版本来源（CI 从 tag 推）与应用自报版本（烤进安装包元数据、
  # updater 据它比对）；不一致会让已装用户陷入反复「有新版」误报。这里在出包前直接拦死。
  # workflow_dispatch（手动逃生口）无 tag，跳过校验、放行重发/回滚。
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert tag version == tauri.conf version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          # tauri.conf.json5 带注释，jq 解析不了；按行首缩进锚定顶层 "version" 键，避开注释里的同名字样。
          CONFIG_VERSION=$(sed -nE 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
            apps/desktop/src-tauri/tauri.conf.json5 | head -1)
          echo "tag=$TAG_VERSION  config=$CONFIG_VERSION"
          if [ -z "$CONFIG_VERSION" ]; then
            echo "::error::无法从 tauri.conf.json5 解析出 version 字段"; exit 1
          fi
          if [ "$TAG_VERSION" != "$CONFIG_VERSION" ]; then
            echo "::error::tag 版本($TAG_VERSION) ≠ tauri.conf.json5 version($CONFIG_VERSION)，发版中止。改 config version 后重打 tag。"
            exit 1
          fi
          echo "✅ 版本一致：$TAG_VERSION"

  build:
    needs: [verify-desktop, verify-sidecar, verify-version]   # 三道门禁全绿才出包
    permissions:
      contents: write   # 让 GITHUB_TOKEN 能创建/写入 Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple 芯片 (arm64)——只出货 Apple Silicon，不再支持 Intel mac
            platform: darwin-aarch64
          - os: windows-2022     # Windows (x86_64)，钉死版本保证可复现
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise install
      - run: mise run install
      - run: mise run bundle-sidecar
      - run: mise run stage-sidecar
      - name: Build Tauri app
        working-directory: apps/desktop
        # 经 mise exec 调用，确保用上 mise 钉死的 pnpm（工具链强制走 mise）。
        # --config 合并打包专用配置：把 sidecar 二进制打进包（externalBin）+ 产出带签名的更新制品
        #（createUpdaterArtifacts）。签名私钥由下方 env 从 secret 注入，缺失则构建失败（符合预期）。
        run: mise exec -- pnpm tauri build --config src-tauri/tauri.bundle.conf.json5
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Prepare updater artifact + fragment
        # 把本平台的更新制品落到确定名字，并产出一段 latest.json 片段（平台→{签名,下载地址}）供聚合。
        # macOS 的 .app.tar.gz 默认叫 Keeper.app.tar.gz；加 arch 后缀（aarch64）保持与下载页/历史命名一致。
        run: |
          set -euo pipefail
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          case "${{ matrix.platform }}" in
            darwin-aarch64) DIR="$BUNDLE/macos"; SUFFIX="aarch64" ;;
            windows-x86_64) DIR="$BUNDLE/nsis"; SUFFIX="" ;;
          esac
          if [ -n "$SUFFIX" ]; then
            SRC=$(ls "$DIR"/*.app.tar.gz)
            BASE=$(basename "$SRC" .app.tar.gz)
            ARTIFACT="$DIR/${BASE}_${SUFFIX}.app.tar.gz"
            mv "$SRC" "$ARTIFACT"
            mv "$SRC.sig" "$ARTIFACT.sig"
          else
            ARTIFACT=$(ls "$DIR"/*-setup.exe)
          fi
          SIG=$(cat "$ARTIFACT.sig")
          FILENAME=$(basename "$ARTIFACT")
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${FILENAME}"
          mkdir -p frag
          jq -nc --arg p "${{ matrix.platform }}" --arg s "$SIG" --arg u "$URL" \
            '{($p): {signature: $s, url: $u}}' > "frag/${{ matrix.platform }}.json"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
      - name: Upload installers + updater artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload latest.json fragment
        uses: actions/upload-artifact@v4
        with:
          name: updater-fragment-${{ matrix.platform }}
          path: frag/

  # 聚合：把各平台片段合成一份 latest.json（updater 据它判断有无新版），上传到同一 Release。
  latest-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: frags
          pattern: updater-fragment-*
          merge-multiple: true
      - name: Compose latest.json
        run: |
          set -euo pipefail
          # 版本号取自 tag（去掉 desktop-v 前缀）——必须与 tauri.conf.json5 的 version 一致，
          # 否则 updater 的版本比对会失准（发版前务必把 config version 改成本次版本）。
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          PLATFORMS=$(jq -s 'reduce .[] as $f ({}; . * $f)' frags/*.json)
          jq -n \
            --arg v "$VERSION" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' > latest.json
          cat latest.json
      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
