name: Quality

# 可复用的质量门禁（单一可发布产品 = 桌面应用，sidecar 随其打包、不独立发布，故合到一份）：
# 供 ci.yml（PR/push）与 release.yml（发版前）共同调用，保证「合并前校验」与「发版前校验」
# 用同一份定义，永不漂移。内含两条互不相干的检查 job，并行跑。
on:
  workflow_call:

permissions:
  contents: read

jobs:
  # desktop：前端类型检查 + Rust 格式/clippy。在真实出货平台上跑，抓 Linux 抓不到的平台相关问题
  # （mac/win 专属 cfg、平台 API）；矩阵与 release.yml 出货目标一一对应，每个要发布的平台都被覆盖。
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14        # Apple 芯片 (arm64)——只出货 Apple Silicon，不再支持 Intel mac
          - windows-2022    # Windows (x86_64)，钉死版本保证可复现
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # mise-action 默认 install: true，已自动跑 `mise install` 装 [tools] 工具链，无需再写一步。
      - name: Set up mise
        uses: jdx/mise-action@v4
      # 项目依赖（node_modules）mise-action 不负责，显式装；--frozen 按 lockfile 精确安装保证可复现。
      - name: Install desktop deps
        run: mise run install-desktop --frozen
      # 补装 rustfmt/clippy 组件（mise 委托 rustup 时 [tools].components 不生效）——env 准备而非真依赖，显式成步。
      - name: Ensure rust components
        run: mise run rust-components-desktop
      # 先构建前端：vue-tsc 类型检查 + 产出 dist（build-tauri 要求 frontendDist 存在，clippy 才能编译）
      - name: Build frontend (typecheck + dist)
        run: mise run build-desktop
      - name: Rust format check
        run: mise run fmt-check-desktop
      - name: Rust clippy
        run: mise run clippy-desktop

  # sidecar：Python lint + test（打包会把它冻结进安装包，发版前先验一遍）。
  sidecar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # mise-action 默认 install: true，已自动装 [tools] 工具链，无需再写一步。
      - name: Set up mise
        uses: jdx/mise-action@v4
      # 项目依赖（Python venv）mise-action 不负责，显式装；--frozen 按 uv.lock 精确安装保证可复现。
      - name: Install deps
        run: mise run install-sidecar --frozen
      - name: Lint
        run: mise run lint-sidecar
      - name: Test
        run: mise run test-sidecar
