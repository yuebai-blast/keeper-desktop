# Keeper（留影）工具链与命令定义
# 版本锁在 [tools]（必须钉死具体版本，禁止 latest）；命令定义为 [tasks.*]。
# 一律用 `mise run <task>`，不要直接调底层命令。
#
# 这是一个 monorepo：
#   sidecar/        Python 本地推理服务（分组 / 硬废片 / 组内排序 / 大模型打分）
#   desktop/        Tauri 桌面应用（Vue3 + TS 前端 + Rust 壳）
# 两个子项目各自启动，所以启动 task 按场景拆成 sidecar / app，不塞进一个 run。
# 本仓只产出【一个】可发布产品（桌面应用，sidecar 随其打包、不独立发布）。task 命名「动作在前」：
#   · 作用于单一子栈（Python sidecar / Tauri desktop）的命令带 -sidecar / -desktop 后缀，一眼看出对象；
#   · 作用于整个产品的命令（package / icon / release / gen-update-keys）不带后缀（无歧义，单一产品）。

[tools]
python = "3.11.15"       # sidecar 的 pyproject 要求 >=3.11,<3.14；钉死具体版本保证可复现
uv = "0.11.20"           # Python 依赖管理与解析统一走 uv
node = "24.16.0"         # 前端 / Tauri 构建
pnpm = "10.11.0"         # 前端包管理器（首次 `mise install` 若版本不可用，按提示改成最近的可用版）
# Tauri 壳编译（Tauri 2 依赖树要求 rustc ≥1.88，钉新版留余量）。
# 注意：mise 的 rust 后端只是「委托系统 rustup」（装目录是指向 ~/.cargo/bin 的符号链接，
# 实际跑 `rustup toolchain install` + 注入 RUSTUP_TOOLCHAIN）。在此后端下 `components`
# 选项会被静默忽略——全新环境只装默认 3 件套（rustc/cargo/std），不含 rustfmt/clippy，
# 导致 fmt-check-desktop / clippy-desktop 报 "'cargo-fmt' is not installed"。故组件的可靠
# 安装改由 rust-components-desktop task 幂等补装（见下），这里保留 components 仅作未来兼容。
rust = { version = "1.96.0", components = "rustfmt,clippy" }

# —— 安装 ——
[tasks.install]
description = "安装全部依赖：sidecar 的 Python 依赖 + desktop 的前端依赖（聚合，本职就是装全部）"
depends = ["install-sidecar", "install-desktop"]

[tasks.install-sidecar]
description = "安装 sidecar 的 Python 依赖（uv sync）"
dir = "sidecar"
# --frozen 给 CI/打包用：按 uv.lock 精确安装、与 pyproject 不一致则报错（保证可复现）；本地缺省可更新 lock。
usage = '''
flag "--frozen" help="按 uv.lock 精确安装、不更新 lock（CI/打包用）"
'''
# 显式 bash：run 用了 ${usage_frozen:+…} 参数展开，Windows runner 上 mise 默认 shell 非 bash，不写会原样传给 uv 报错。
shell = "bash -c"
run = "uv sync ${usage_frozen:+--frozen}"

[tasks.install-desktop]
description = "安装 desktop 前端依赖（pnpm install）"
dir = "desktop"
usage = '''
flag "--frozen" help="按 pnpm-lock.yaml 精确安装、不更新 lock（CI/打包用）"
'''
# 显式 bash：run 用了 ${usage_frozen:+…} 参数展开，Windows runner 上 mise 默认 shell 非 bash，不写会原样传给 pnpm 报错。
shell = "bash -c"
run = "pnpm install ${usage_frozen:+--frozen-lockfile}"

# —— 启动 ——
[tasks.sidecar]
description = "启动本地推理服务（FastAPI，默认 127.0.0.1）；透传参数：mise run sidecar -- --port 8761"
dir = "sidecar"
run = "uv run python -m keeper_engine.main"

[tasks.app]
description = "启动 Tauri 桌面应用（开发模式，自动起前端 + 壳）"
dir = "desktop"
run = "pnpm tauri dev"

# —— 调试 ——
[tasks.localscore-sidecar]
description = "对单张本地图片跑层①评分并打印明细（调试/标定用）：mise run localscore-sidecar -- /path/to/img.jpg"
dir = "sidecar"
run = "uv run python devtools/localscore.py"

# —— 构建打包 ——
[tasks.build-desktop]
description = "构建 desktop 前端：vue-tsc 类型检查 + vite 打包（产出 desktop/dist；tauri-build 要求 frontendDist 存在，clippy 才能编译）"
dir = "desktop"
# 直接调底层命令（命令唯一权威在此），不再转调 package.json 的 scripts。
run = "pnpm vue-tsc --noEmit && pnpm vite build"

[tasks.bundle-sidecar]
description = "用 PyInstaller 把 sidecar 冻结成 onedir 目录（产物 sidecar/dist/keeper-sidecar/）"
dir = "sidecar"
run = "uv run pyinstaller keeper-sidecar.spec --noconfirm --clean"

[tasks.stage-sidecar]
description = "把 PyInstaller onedir 产物整目录拷到 Tauri binaries/keeper-sidecar（供 bundle.resources 随包）"
dir = "."
# onedir 走 bundle.resources（非 externalBin），不再需要 target-triple 命名：每平台 CI 各自构建、
# 目录内容本就平台专属。直接整目录覆盖拷到固定落位点。脚本是 bash 语法，显式钉 bash 保证 Mac/Windows 一致
#（mise 在 Windows 默认 cmd /c 会解析失败，且自动优先 Git Bash/MSYS2 的 POSIX bash）。
shell = "bash -c"
run = """
DST=desktop/src-tauri/binaries/keeper-sidecar
rm -rf "$DST"
mkdir -p desktop/src-tauri/binaries
cp -R sidecar/dist/keeper-sidecar "$DST"
"""

[tasks.package]
# 打包态才需要把 sidecar 目录打进应用：bundle.resources 只在打包专用配置 tauri.bundle.conf.json5 里，
# 经 --config 合并进来；base tauri.conf.json5 不含它，所以本地 dev（mise run app）零依赖、
# 不必先跑 stage-sidecar。详见 docs/packaging.md。
description = "打包桌面应用（最终产品）：冻结 sidecar → 放入 binaries → tauri build（带 resources 的打包专用配置）"
dir = "desktop"
run = """
mise run bundle-sidecar
mise run stage-sidecar
pnpm tauri build --config src-tauri/tauri.bundle.conf.json5
"""

[tasks.icon]
description = "从 brand/ 标志重生成桌面应用图标并应用（改了 logo 后跑一次）"
dir = "."
# tauri icon 直接吃 SVG（resvg 栅格化），一份母版铺满桌面 + Windows Store 全套尺寸；
# 它会顺带生成 android/ios/64x64，本产品只发桌面，跑完删掉以保持图标目录与 tauri.conf 引用一致。
shell = "bash -c"
run = """
pnpm --dir desktop tauri icon ../brand/keeper-app-icon.svg -o src-tauri/icons
rm -rf desktop/src-tauri/icons/android desktop/src-tauri/icons/ios desktop/src-tauri/icons/64x64.png
"""

# —— 质量门禁（CI 与发版前共用，命令统一走 mise）——
[tasks.lint-sidecar]
description = "sidecar 代码风格检查（ruff）"
dir = "sidecar"
run = "uv run ruff check ."

[tasks.test-sidecar]
description = "跑 sidecar 测试；可指定文件/用例：mise run test-sidecar -- tests/test_grouping.py"
dir = "sidecar"
run = "uv run pytest"

[tasks.rust-components-desktop]
description = "幂等确保 rustfmt/clippy 组件就位（mise 委托 rustup 时 [tools].components 不生效，这里补装）"
# 不带 --toolchain：rustup 自动作用于 mise 注入的 RUSTUP_TOOLCHAIN(=1.96.0)，故无需重复钉版本、零漂移。
# 已装则瞬时 no-op；全新 CI runner 首次会补下，堵死 "'cargo-fmt' is not installed" 这类缺组件失败。
# 这是「装工具」而非真依赖，故不挂进 fmt-check/clippy 的 depends；CI 里在它们之前显式跑一步。
run = "rustup component add rustfmt clippy"

[tasks.fmt-check-desktop]
description = "检查 desktop Rust（src-tauri）代码格式，不改文件、不合规即失败"
dir = "desktop/src-tauri"
run = "cargo fmt --all -- --check"

[tasks.clippy-desktop]
description = "desktop Rust（src-tauri）clippy 静态检查，-D warnings 把告警当错误"
dir = "desktop/src-tauri"
run = "cargo clippy --all-targets -- -D warnings"

# —— 发版 ——
[tasks.release]
description = "发布产品：校验→改版本号→提交→打 tag→推送触发 CI 出包"
# 发版动作只在本地这一步：改 tauri.conf.json5 版本号 + 打 v<版本> tag 推上去，
# 由 .github/workflows/release.yml（tag 触发）跑门禁→双平台出包→建 Release。
# 本仓单一产品，tag 不带组件前缀（直接 v1.2.3）。
# 两个参数均可选、按形状消歧（见 usage）；说明若有则写进 annotated tag 注释，展示在 Release 顶部。
shell = "bash -c"
usage = '''
arg "[arg1]" help="版本号(如 v0.2.0 / 0.2.0)或更新说明；两者按形状自动判定，缺省则取最新稳定 tag patch+1" default=""
arg "[arg2]" help="更新说明（当 arg1 是版本号时）；写入 annotated tag，置顶展示在 Release" default=""
'''
run = '''
set -euo pipefail
A1="${usage_arg1:-}"
A2="${usage_arg2:-}"
CONF="desktop/src-tauri/tauri.conf.json5"
verre='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'

# 前置同步：一次 fetch 同时供「自动算版本号」与「main 落后检查」复用。
[ "$(git rev-parse --abbrev-ref HEAD)" = "main" ] || { echo "❌ 必须在 main 分支发版"; exit 1; }
[ -z "$(git status --porcelain)" ] || { echo "❌ 工作区不干净，请先提交或清理"; exit 1; }
git fetch origin main --tags --quiet
[ "$(git rev-list --count HEAD..origin/main)" = "0" ] || { echo "❌ 本地 main 落后 origin/main，请先同步"; exit 1; }

# 参数按形状消歧：两个→版本号+说明；一个→像版本号则当版本号、否则当说明；零个→自动 patch+1。
VERSION=""; MESSAGE=""
if [ -n "$A2" ]; then
  VERSION="$A1"; MESSAGE="$A2"
elif [ -n "$A1" ]; then
  if [[ "$A1" =~ $verre ]]; then VERSION="$A1"; else MESSAGE="$A1"; fi
fi
if [ -z "$VERSION" ]; then
  # 自动取最新稳定 tag（git 内置版本排序，禁用 BSD 不支持的 sort -V）后 patch+1，只动 patch。
  LATEST=$(git tag -l --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
  [ -n "${LATEST}" ] || { echo "❌ 找不到形如 vX.Y.Z 的稳定 tag，请显式传版本号（首个 v* 版本必须显式给定）"; exit 1; }
  BASE="${LATEST#v}"
  IFS=. read -r MA MI PA <<< "$BASE"
  VERSION="$MA.$MI.$((PA + 1))"
fi
VERSION="${VERSION#v}"
[[ "v$VERSION" =~ $verre ]] || { echo "❌ 版本号不合法：${VERSION}"; exit 1; }
TAG="v$VERSION"
! git rev-parse "$TAG" >/dev/null 2>&1 || { echo "❌ tag ${TAG} 已存在"; exit 1; }

# 改版本号（tauri.conf.json5 顶层 version；CI 的 verify-version 会校验它与 tag 逐字一致）。
# JSON5 带注释，pnpm version / jq 都改不了；该文件内仅顶层一行匹配 "version": "..."，
# 故按行首缩进锚定后全量替换即只动这一行；用临时文件避开 sed -i 的 BSD/GNU 差异。
OLD=$(sed -nE 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' "$CONF" | head -1)
TMP=$(mktemp)
sed -E "s/^([[:space:]]*\"version\"[[:space:]]*:[[:space:]]*\")[^\"]+/\1$VERSION/" "$CONF" > "$TMP" && mv "$TMP" "$CONF"
echo "版本号 $OLD → $VERSION"

# 提交版本号（独立一条，沿用现有约定）。
git add "$CONF"
git commit -m "chore(desktop): 版本号 $OLD → $VERSION"

# 打 tag：有说明→annotated（注释进 Release 顶部）；无→轻量。
if [ -n "$MESSAGE" ]; then
  git tag -a "$TAG" -m "$MESSAGE"
else
  git tag "$TAG"
fi

# 推送：先 main 再 tag（tag 触发发版 workflow）。
git push origin main
git push origin "$TAG"
# 变量后紧跟全角标点要用 ${} 界定，否则中文逗号会被并进变量名（set -u 下报 unbound）。
echo "✅ 已推送 ${TAG}，CI 出包：https://github.com/yuebai-blast/keeper-desktop/actions"
'''

[tasks.gen-update-keys]
description = "生成在线升级用的签名密钥对（一次性）：私钥→CI secret，公钥→tauri.conf.json5 的 plugins.updater.pubkey"
dir = "desktop"
# 产出 ~/.tauri/keeper-updater.key（私钥，妥善保管/进 CI secret）与 keeper-updater.key.pub（公钥，粘进 tauri.conf）。
# 会提示设置密码：设了的话私钥密码即 CI secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD。
run = "pnpm tauri signer generate -w ~/.tauri/keeper-updater.key"
