# Keeper（留影）工具链与命令定义
# 版本锁在 [tools]（必须钉死具体版本，禁止 latest）；命令定义为 [tasks.*]。
# 一律用 `mise run <task>`，不要直接调底层命令。
#
# 这是一个 monorepo：
#   sidecar/        Python 本地推理服务（分组 / 硬废片 / 组内排序 / 大模型打分）
#   desktop/        Tauri 桌面应用（Vue3 + TS 前端 + Rust 壳）
# 两个组件各自启动，所以启动 task 按场景拆成 sidecar / app，不塞进一个 run。

[tools]
python = "3.11.15"       # sidecar 的 pyproject 要求 >=3.11,<3.14；钉死具体版本保证可复现
uv = "0.11.20"           # Python 依赖管理与解析统一走 uv
node = "24.16.0"         # 前端 / Tauri 构建
pnpm = "10.11.0"         # 前端包管理器（首次 `mise install` 若版本不可用，按提示改成最近的可用版）
# Tauri 壳编译（Tauri 2 依赖树要求 rustc ≥1.88，钉新版留余量）。
# 注意：mise 的 rust 后端只是「委托系统 rustup」（装目录是指向 ~/.cargo/bin 的符号链接，
# 实际跑 `rustup toolchain install` + 注入 RUSTUP_TOOLCHAIN）。在此后端下 `components`
# 选项会被静默忽略——全新环境只装默认 3 件套（rustc/cargo/std），不含 rustfmt/clippy，
# 导致 desktop-fmt-check / desktop-clippy 报 "'cargo-fmt' is not installed"。故组件的可靠
# 安装改由 desktop-rust-components task 幂等补装（见下），这里保留 components 仅作未来兼容。
rust = { version = "1.96.0", components = "rustfmt,clippy" }

[tasks.install]
description = "安装全部依赖：sidecar 的 Python 依赖 + desktop 的前端依赖"
# desktop 尚未 scaffold 前，第二条会因缺少 package.json 失败——scaffold 完成后即可正常使用。
run = [
    "uv sync --directory sidecar",
    "pnpm --dir desktop install",
]

[tasks.sidecar]
description = "启动本地推理服务（FastAPI，默认 127.0.0.1）；透传参数：mise run sidecar -- --port 8761"
dir = "sidecar"
run = "uv run python -m keeper_engine.main"

[tasks.app]
description = "启动 Tauri 桌面应用（开发模式，自动起前端 + 壳）"
dir = "desktop"
run = "pnpm tauri dev"

[tasks.test]
description = "跑 sidecar 测试；可指定文件/用例：mise run test -- tests/test_grouping.py"
dir = "sidecar"
run = "uv run pytest"

[tasks.lint]
description = "sidecar 代码风格检查"
dir = "sidecar"
run = "uv run ruff check ."

[tasks.localscore]
description = "对单张本地图片跑层①评分并打印明细（调试/标定用）：mise run localscore -- /path/to/img.jpg"
dir = "sidecar"
run = "uv run python devtools/localscore.py"

[tasks.bundle-sidecar]
description = "用 PyInstaller 把 sidecar 冻结成 onedir 目录（产物 sidecar/dist/keeper-sidecar/）"
dir = "sidecar"
run = "uv run pyinstaller keeper-sidecar.spec --noconfirm --clean"

[tasks.stage-sidecar]
description = "把 PyInstaller onedir 产物整目录拷到 Tauri binaries/keeper-sidecar（供 bundle.resources 随包）"
dir = "."
# onedir 走 bundle.resources（非 externalBin），不再需要 target-triple 命名：每平台 CI 各自构建、
# 目录内容本就平台专属。直接整目录覆盖拷到固定落位点。脚本是 bash 语法，显式钉 bash 保证 Mac/Windows 一致
#（mise 在 Windows 默认 cmd /c 会解析失败，且自动优先 Git Bash/MSYS2 的 POSIX bash）。
shell = "bash -c"
run = """
DST=desktop/src-tauri/binaries/keeper-sidecar
rm -rf "$DST"
mkdir -p desktop/src-tauri/binaries
cp -R sidecar/dist/keeper-sidecar "$DST"
"""

[tasks.package]
# 打包态才需要把 sidecar 目录打进应用：bundle.resources 只在打包专用配置 tauri.bundle.conf.json5 里，
# 经 --config 合并进来；base tauri.conf.json5 不含它，所以本地 dev（mise run app）零依赖、
# 不必先跑 stage-sidecar。详见 docs/packaging.md。
description = "打包桌面应用：冻结 sidecar → 放入 binaries → tauri build（带 resources 的打包专用配置）"
dir = "desktop"
run = """
mise run bundle-sidecar
mise run stage-sidecar
pnpm tauri build --config src-tauri/tauri.bundle.conf.json5
"""

[tasks.desktop-release]
description = "发布 desktop：校验→改版本号→提交→打 tag→推送触发 CI 出包。用法：mise run desktop-release 0.1.6 [\"本次更新说明\"]"
# 发版动作只在本地这一步：改 tauri.conf.json5 版本号 + 打 desktop-v<版本> tag 推上去，
# 由 .github/workflows/desktop-release.yml（tag 触发）跑门禁→双平台出包→建 Release。
# 第二参数（可选）写进 annotated tag 注释，会展示在 GitHub Release 顶部；留空则只展示自动生成的提交列表。
shell = "bash -c"
usage = '''
arg "<version>" help="目标版本号，如 0.1.6（不带 desktop-v 前缀）"
arg "[message]" help="本次更新说明（写入 annotated tag，置顶展示在 Release）；留空则只有自动提交列表" default=""
'''
run = '''
set -euo pipefail
VERSION="$usage_version"
MESSAGE="$usage_message"
TAG="desktop-v$VERSION"
CONF="desktop/src-tauri/tauri.conf.json5"

# 前置校验：干净的 main、与 origin 同步、tag 未占用——发版前把脚下踩实。
[ "$(git rev-parse --abbrev-ref HEAD)" = "main" ] || { echo "❌ 必须在 main 分支发版"; exit 1; }
[ -z "$(git status --porcelain)" ] || { echo "❌ 工作区不干净，请先提交或清理"; exit 1; }
git fetch origin main --tags --quiet
[ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ] || { echo "❌ 本地 main 与 origin/main 不一致，请先同步"; exit 1; }
! git rev-parse "$TAG" >/dev/null 2>&1 || { echo "❌ tag $TAG 已存在"; exit 1; }

# 改版本号（tauri.conf.json5 顶层 version；CI 的 verify-version 会校验它与 tag 逐字一致）。
# 该文件内仅顶层一行匹配 "version": "..."，故全量替换即只动这一行；用临时文件避开 sed -i 的 BSD/GNU 差异。
OLD=$(sed -nE 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' "$CONF" | head -1)
TMP=$(mktemp)
sed -E "s/^([[:space:]]*\"version\"[[:space:]]*:[[:space:]]*\")[^\"]+/\1$VERSION/" "$CONF" > "$TMP" && mv "$TMP" "$CONF"
echo "版本号 $OLD → $VERSION"

# 提交版本号（独立一条，沿用现有约定）。
git add "$CONF"
git commit -m "chore(desktop): 版本号 $OLD → $VERSION"

# 打 tag：有说明→annotated（注释进 Release 顶部）；无→轻量。
if [ -n "$MESSAGE" ]; then
  git tag -a "$TAG" -m "$MESSAGE"
else
  git tag "$TAG"
fi

# 推送：先 main 再 tag（tag 触发发版 workflow）。
git push origin main
git push origin "$TAG"
# 变量后紧跟全角标点要用 ${} 界定，否则中文逗号会被并进变量名（set -u 下报 unbound）。
echo "✅ 已推送 ${TAG}，CI 出包：https://github.com/yuebai-blast/keeper-desktop/actions"
'''

[tasks.gen-update-keys]
description = "生成在线升级用的签名密钥对（一次性）：私钥→CI secret，公钥→tauri.conf.json5 的 plugins.updater.pubkey"
dir = "desktop"
# 产出 ~/.tauri/keeper-updater.key（私钥，妥善保管/进 CI secret）与 keeper-updater.key.pub（公钥，粘进 tauri.conf）。
# 会提示设置密码：设了的话私钥密码即 CI secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD。
run = "pnpm tauri signer generate -w ~/.tauri/keeper-updater.key"

[tasks.icon]
description = "从 brand/ 标志重生成桌面应用图标并应用（改了 logo 后跑一次）"
dir = "."
# tauri icon 直接吃 SVG（resvg 栅格化），一份母版铺满桌面 + Windows Store 全套尺寸；
# 它会顺带生成 android/ios/64x64，本产品只发桌面，跑完删掉以保持图标目录与 tauri.conf 引用一致。
shell = "bash -c"
run = """
pnpm --dir desktop tauri icon ../brand/keeper-app-icon.svg -o src-tauri/icons
rm -rf desktop/src-tauri/icons/android desktop/src-tauri/icons/ios desktop/src-tauri/icons/64x64.png
"""

# ---- desktop 质量门禁（CI 与发版前共用，命令统一走 mise）----
[tasks.desktop-install]
description = "安装 desktop 前端依赖"
run = "pnpm --dir desktop install"

[tasks.desktop-build]
description = "构建 desktop 前端：vue-tsc 类型检查 + vite 打包（产出 desktop/dist；tauri-build 要求 frontendDist 存在，clippy 才能编译）"
dir = "desktop"
run = "pnpm build"

[tasks.desktop-rust-components]
description = "幂等确保 rustfmt/clippy 组件就位（mise 委托 rustup 时 [tools].components 不生效，这里补装）"
# 不带 --toolchain：rustup 自动作用于 mise 注入的 RUSTUP_TOOLCHAIN(=1.96.0)，故无需重复钉版本、零漂移。
# 已装则瞬时 no-op；全新 CI runner 首次会补下，堵死 "'cargo-fmt' is not installed" 这类缺组件失败。
run = "rustup component add rustfmt clippy"

[tasks.desktop-fmt-check]
description = "检查 desktop Rust（src-tauri）代码格式，不改文件、不合规即失败"
depends = ["desktop-rust-components"]
dir = "desktop/src-tauri"
run = "cargo fmt --all -- --check"

[tasks.desktop-clippy]
description = "desktop Rust（src-tauri）clippy 静态检查，-D warnings 把告警当错误"
depends = ["desktop-rust-components"]
dir = "desktop/src-tauri"
run = "cargo clippy --all-targets -- -D warnings"
