# Keeper 官网容器内 Nginx 站点配置（落在 /etc/nginx/conf.d/default.conf）。
# 容器只监听 80 明文 HTTP；HTTPS/HSTS 由前置反向代理或 Cloudflare 负责。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # 带 hash 的静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control public,immutable;
    }

    # index.html 不缓存，保证发版即时可见
    location = /index.html {
        add_header Cache-Control no-cache;
    }

    # 单页回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
